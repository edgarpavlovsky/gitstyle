<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gitstyle</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #484f58;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --gold: #e3b341;
  --green: #3fb950;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --gray: #8b949e;
  --red: #f85149;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Layout */
#app { display: flex; height: 100vh; }

#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar */
.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.sidebar-header .wiki-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-transform: none;
  letter-spacing: 0;
  margin-top: 4px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.sidebar-nav::-webkit-scrollbar { width: 6px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.nav-group { margin-bottom: 4px; }

.nav-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 8px 16px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px 6px 24px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.1s;
  text-decoration: none;
}

.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-hover); color: var(--accent); }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.nav-dot.index { background: var(--gold); }
.nav-dot.style { background: var(--blue); }
.nav-dot.language { background: var(--green); }
.nav-dot.meta { background: var(--gray); }
.nav-dot.other { background: var(--purple); }

/* View toggle */
.view-toggle {
  display: flex;
  padding: 12px 16px;
  gap: 4px;
  border-top: 1px solid var(--border);
}

.view-btn {
  flex: 1;
  padding: 6px 0;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  font-family: var(--font);
}

.view-btn:first-child { border-radius: 6px 0 0 6px; }
.view-btn:last-child { border-radius: 0 6px 6px 0; }
.view-btn:hover { background: var(--bg-hover); color: var(--text); }
.view-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Graph */
#graph-view {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#graph-view svg { width: 100%; height: 100%; }

.graph-tooltip {
  position: absolute;
  padding: 6px 10px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  white-space: nowrap;
}

.graph-tooltip.visible { opacity: 1; }

/* Article view */
#article-view {
  flex: 1;
  overflow-y: auto;
  display: none;
}

#article-view::-webkit-scrollbar { width: 8px; }
#article-view::-webkit-scrollbar-track { background: transparent; }
#article-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.article-container {
  max-width: 780px;
  margin: 0 auto;
  padding: 40px 32px 80px;
}

.article-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.meta-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 500;
}

.meta-badge.category {
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.meta-badge.confidence-high { background: rgba(63, 185, 80, 0.15); color: var(--green); }
.meta-badge.confidence-medium { background: rgba(227, 179, 65, 0.15); color: var(--gold); }
.meta-badge.confidence-low { background: rgba(248, 81, 73, 0.15); color: var(--red); }

/* Markdown content */
.article-content h1 { font-size: 28px; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.article-content h2 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; }
.article-content h3 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; }
.article-content p { line-height: 1.7; margin-bottom: 16px; color: var(--text); }
.article-content ul, .article-content ol { margin-bottom: 16px; padding-left: 24px; }
.article-content li { line-height: 1.7; margin-bottom: 4px; }

.article-content a {
  color: var(--accent);
  text-decoration: none;
}
.article-content a:hover { text-decoration: underline; }

.article-content code {
  font-family: var(--mono);
  font-size: 0.9em;
  background: rgba(110, 118, 129, 0.15);
  padding: 2px 6px;
  border-radius: 4px;
}

.article-content pre {
  margin-bottom: 16px;
  border-radius: 8px;
  overflow-x: auto;
  border: 1px solid var(--border);
}

.article-content pre code {
  display: block;
  padding: 16px;
  background: var(--bg-surface);
  font-size: 13px;
  line-height: 1.5;
  border-radius: 0;
}

.article-content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 16px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.article-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 14px;
}

.article-content th, .article-content td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.article-content th {
  background: var(--bg-surface);
  font-weight: 600;
}

/* Wikilinks rendered as internal links */
.wikilink {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px dashed var(--accent);
}
.wikilink:hover { border-bottom-style: solid; }

/* CDN error banner */
.cdn-error {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(248, 81, 73, 0.15);
  color: var(--red);
  text-align: center;
  padding: 8px;
  font-size: 13px;
  z-index: 100;
  display: none;
}

/* Responsive */
@media (max-width: 768px) {
  #sidebar { display: none; }
  .article-container { padding: 24px 16px 60px; }
}
</style>
</head>
<body>
<div class="cdn-error" id="cdn-error">
  Some libraries failed to load (no internet?). Markdown rendering may be limited.
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>gitstyle</h1>
      <div class="wiki-name" id="wiki-name"></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-graph" onclick="showView('graph')">Graph</button>
      <button class="view-btn" id="btn-article" onclick="showView('article')">Articles</button>
    </div>
  </div>

  <div id="main">
    <div id="graph-view">
      <div class="graph-tooltip" id="tooltip"></div>
    </div>
    <div id="article-view">
      <div class="article-container" id="article-content"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function() {
  // CDN fallback check
  let cdnOk = true;
  if (typeof d3 === 'undefined' || typeof marked === 'undefined') {
    document.getElementById('cdn-error').style.display = 'block';
    cdnOk = false;
  }

  // State
  let files = [];
  let graph = { nodes: [], edges: [] };
  let currentView = 'graph';
  let currentSlug = null;
  let simulation = null;

  // Category colors
  const COLORS = { index: '#e3b341', style: '#58a6ff', language: '#3fb950', meta: '#8b949e', other: '#bc8cff' };

  // Init
  async function init() {
    try {
      const [filesRes, graphRes] = await Promise.all([
        fetch('/api/files').then(r => r.json()),
        fetch('/api/graph').then(r => r.json())
      ]);
      files = filesRes;
      graph = graphRes;
    } catch (e) {
      console.error('Failed to load wiki data:', e);
      return;
    }

    // Set wiki name from index title or first file
    const indexFile = files.find(f => f.slug === 'index');
    if (indexFile) {
      const name = indexFile.title || 'Wiki';
      document.getElementById('wiki-name').textContent = name;
      document.title = `${name} — gitstyle`;
    }

    buildSidebar();
    if (cdnOk) initGraph();
  }

  // Sidebar
  function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const groups = {};
    const order = ['index', 'style', 'language', 'meta', 'other'];

    files.forEach(f => {
      const cat = f.category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(f);
    });

    nav.innerHTML = '';
    order.forEach(cat => {
      if (!groups[cat]) return;
      const label = cat === 'index' ? '' : cat.charAt(0).toUpperCase() + cat.slice(1);
      if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'nav-group-label';
        lbl.textContent = label;
        nav.appendChild(lbl);
      }
      groups[cat].forEach(f => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.slug = f.slug;
        item.innerHTML = `<span class="nav-dot ${cat}"></span>${f.title || f.slug}`;
        item.addEventListener('click', () => loadArticle(f.slug));
        nav.appendChild(item);
      });
    });
  }

  // View switching
  window.showView = function(view) {
    currentView = view;
    document.getElementById('graph-view').style.display = view === 'graph' ? 'flex' : 'none';
    document.getElementById('article-view').style.display = view === 'article' ? 'block' : 'none';
    document.getElementById('btn-graph').classList.toggle('active', view === 'graph');
    document.getElementById('btn-article').classList.toggle('active', view === 'article');
    if (view === 'graph' && simulation) simulation.alpha(0.3).restart();
  };

  // Article loading
  async function loadArticle(slug) {
    currentSlug = slug;
    showView('article');

    // Update sidebar active state
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.slug === slug);
    });

    try {
      const res = await fetch(`/api/file/${slug}`);
      const data = await res.json();
      renderArticle(data);
    } catch (e) {
      document.getElementById('article-content').innerHTML =
        `<p style="color:var(--red)">Failed to load article.</p>`;
    }
  }

  function renderArticle(data) {
    const container = document.getElementById('article-content');
    const meta = data.meta || {};

    // Meta badges
    let badges = '';
    if (meta.category) {
      badges += `<span class="meta-badge category">${meta.category}</span>`;
    }
    if (meta.confidence) {
      badges += `<span class="meta-badge confidence-${meta.confidence}">${meta.confidence} confidence</span>`;
    }

    // Parse markdown — strip frontmatter first
    let md = data.content || '';
    if (md.startsWith('---')) {
      const end = md.indexOf('---', 3);
      if (end !== -1) md = md.substring(end + 3).trim();
    }

    // Convert wikilinks to clickable spans before markdown parsing
    md = md.replace(/\[\[([^\]]+)\]\]/g, (_, target) => {
      const display = target.split('/').pop();
      return `<a class="wikilink" data-target="${target}" onclick="event.preventDefault();loadArticleByTarget('${target}')">${display}</a>`;
    });

    let html = '';
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: false, gfm: true });
      html = marked.parse(md);
    } else {
      // Minimal fallback
      html = `<pre style="white-space:pre-wrap">${md}</pre>`;
    }

    container.innerHTML = `
      <div class="article-meta">${badges}</div>
      <div class="article-content">${html}</div>
    `;

    // Syntax highlighting
    if (typeof hljs !== 'undefined') {
      container.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    }

    // Scroll to top
    document.getElementById('article-view').scrollTop = 0;
  }

  // Global function for wikilink clicks
  window.loadArticleByTarget = function(target) {
    // Check if target exists in files
    const exists = files.some(f => f.slug === target);
    if (exists) loadArticle(target);
  };

  // Graph
  function initGraph() {
    if (typeof d3 === 'undefined') return;

    const container = document.getElementById('graph-view');
    const width = container.clientWidth;
    const height = container.clientHeight;
    const tooltip = document.getElementById('tooltip');

    const svg = d3.select('#graph-view')
      .append('svg')
      .attr('width', width)
      .attr('height', height);

    // Zoom
    const g = svg.append('g');
    const zoom = d3.zoom()
      .scaleExtent([0.3, 4])
      .on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    // Center initially
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2));

    // Build simulation data
    const nodes = graph.nodes.map(n => ({ ...n }));
    const edges = graph.edges.map(e => ({ ...e }));

    // Link force
    const linkForce = d3.forceLink(edges)
      .id(d => d.id)
      .distance(100);

    simulation = d3.forceSimulation(nodes)
      .force('link', linkForce)
      .force('charge', d3.forceManyBody().strength(-300))
      .force('center', d3.forceCenter(0, 0))
      .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 4));

    // Edges
    const link = g.append('g')
      .selectAll('line')
      .data(edges)
      .join('line')
      .attr('stroke', 'rgba(48, 54, 61, 0.6)')
      .attr('stroke-width', 1);

    // Nodes
    const node = g.append('g')
      .selectAll('circle')
      .data(nodes)
      .join('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => COLORS[d.category] || COLORS.other)
      .attr('stroke', 'none')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', dragStart)
        .on('drag', dragging)
        .on('end', dragEnd));

    // Labels
    const label = g.append('g')
      .selectAll('text')
      .data(nodes)
      .join('text')
      .text(d => d.title)
      .attr('font-size', d => d.category === 'index' ? '13px' : '11px')
      .attr('font-weight', d => d.category === 'index' ? '600' : '400')
      .attr('fill', 'var(--text-muted)')
      .attr('text-anchor', 'middle')
      .attr('dy', d => nodeRadius(d) + 14)
      .attr('pointer-events', 'none');

    // Interactions
    node.on('mouseover', function(event, d) {
      d3.select(this).attr('stroke', '#fff').attr('stroke-width', 2);
      // Highlight connected edges
      link.attr('stroke', e =>
        (e.source.id === d.id || e.target.id === d.id)
          ? COLORS[d.category] || COLORS.other
          : 'rgba(48, 54, 61, 0.6)'
      ).attr('stroke-width', e =>
        (e.source.id === d.id || e.target.id === d.id) ? 2 : 1
      );
      // Highlight connected nodes
      const connected = new Set();
      edges.forEach(e => {
        if (e.source.id === d.id) connected.add(e.target.id);
        if (e.target.id === d.id) connected.add(e.source.id);
      });
      node.attr('opacity', n => n.id === d.id || connected.has(n.id) ? 1 : 0.2);
      label.attr('opacity', n => n.id === d.id || connected.has(n.id) ? 1 : 0.15);

      tooltip.textContent = d.title;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', 'none');
      link.attr('stroke', 'rgba(48, 54, 61, 0.6)').attr('stroke-width', 1);
      node.attr('opacity', 1);
      label.attr('opacity', 1);
      tooltip.classList.remove('visible');
    })
    .on('click', function(event, d) {
      loadArticle(d.id);
    });

    // Tick
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node
        .attr('cx', d => d.x)
        .attr('cy', d => d.y);
      label
        .attr('x', d => d.x)
        .attr('y', d => d.y);
    });

    // Drag handlers
    function dragStart(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    function dragging(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    function dragEnd(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // Resize
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      svg.attr('width', w).attr('height', h);
    });
  }

  function nodeRadius(d) {
    if (d.category === 'index') return 14;
    return 5 + Math.min(d.links * 2, 8);
  }

  init();
})();
</script>
</body>
</html>
